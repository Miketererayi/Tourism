steps:
  # 1. Install Composer dependencies
  - name: 'composer:latest'
    entrypoint: 'composer'
    args: ['install', '--no-dev', '--optimize-autoloader']
    
  # 2. Install NPM dependencies and build assets
  - name: 'node:20'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'npm ci && npm run build'

  # 3. Run tests
  - name: 'php:8.3-cli-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apk add --no-cache postgresql-dev libzip-dev
        docker-php-ext-install pdo_pgsql zip
        php artisan test

  # 4. Docker build and tag image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/directory:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/directory:latest', '.']

  # 5. Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/directory', '--all-tags']

  # 6. Run database migrations using Cloud Run Jobs
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud run jobs update directory-migrate \
          --image gcr.io/$PROJECT_ID/directory:$COMMIT_SHA \
          --region $_REGION
        gcloud run jobs execute directory-migrate \
          --region $_REGION \
          --wait

  # 7. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud run deploy directory \
          --image gcr.io/$PROJECT_ID/directory:$COMMIT_SHA \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --set-secrets APP_KEY=app-key:latest,DB_PASSWORD=db-password:latest \
          --set-env-vars APP_ENV=production \
          --min-instances 1 \
          --max-instances 10 \
          --memory 512Mi \
          --cpu 1 \
          --concurrency 80 \
          --timeout 30

  # 8. Clear sitemap cache
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud run jobs update directory-sitemap-clear \
          --image gcr.io/$PROJECT_ID/directory:$COMMIT_SHA \
          --region $_REGION \
          --command "php,artisan,sitemap:clear"
        gcloud run jobs execute directory-sitemap-clear --region $_REGION --wait

  # 9. Warm the cache
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud run jobs update directory-warm-cache \
          --image gcr.io/$PROJECT_ID/directory:$COMMIT_SHA \
          --region $_REGION \
          --command "sh,-c,php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan event:cache"
        gcloud run jobs execute directory-warm-cache --region $_REGION --wait

substitutions:
  _REGION: 'africa-south1'
